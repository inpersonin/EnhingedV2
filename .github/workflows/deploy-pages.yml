name: Deploy GitHub Pages — Enhinged V2

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next
          
      - name: Install dependencies
        run: npm install
        
      - name: Build with Next.js
        run: npm run build
        env:
          # Points to the V2 GitHub Pages path (EnhingedV2 repo).
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          # Points to the V2 HF Space backend.
          NEXT_PUBLIC_API_URL: https://inpersonin-enhingedv2.hf.space
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
